<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="styles.css">
        <style> @import url('https://fonts.cdnfonts.com/css/cursed-timer-ulil'); </style>  
        
    </head>
    <body>
        <div class="sections">
            <div class="teams">
                <div class="home-section">
                    <h1 class="home-title">HOME</h1>
                    <p id="home-score">0</p>
                    <div class="home-btns">
                        <button onclick="homePlus1()">+1</button>
                        <button onclick="homePlus2()">+2</button>
                        <button onclick="homePlus3()">+3</button>
                    </div>
                </div>

                <div class="guest-section">
                    <h1 class="guest-title">Away</h1>
                    <p id="guest-score">0</p>
                    <div class="guest-btns">
                        <button onclick="guestPlus1()">+1</button>
                        <button onclick="guestPlus2()">+2</button>
                        <button onclick="guestPlus3()">+3</button>
                    </div>
                </div>
            </div>

            <button class="reset-btn" onclick="reset()">Reset</button>
        </div>

        

        <script src="index.js"></script>
    </body>



</html>
